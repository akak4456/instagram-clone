<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .story-ring {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        padding: 3px; /* 테두리 두께 */

        background: linear-gradient(
          45deg,
          #feda75,
          #fa7e1e,
          #d62976,
          #962fbf,
          #4f5bd5
        );
      }

      .profile {
        width: 100%;
        height: 100%;
        border-radius: 50%;

        background: url("https://via.placeholder.com/150") center/cover;
        background-color: white; /* 내부 배경 */
      }
    </style>
  </head>
  <body>
    <div class="story-ring">
      <div class="profile"></div>
    </div>
  </body>
</html>
